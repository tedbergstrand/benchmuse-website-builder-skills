# Netlify configuration for luthier websites
# The Site Builder skill copies this into website/ automatically during the build

[build]
  # For vanilla HTML/CSS/JS sites, publish is the website directory itself
  publish = "."

  # For React/Vite sites, uncomment these instead:
  # command = "npm run build"
  # publish = "dist"

# Redirect /index.html to / for cleaner URLs
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 200

# Custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
